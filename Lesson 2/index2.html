<!DOCTYPE html>
<html lang="en">
<head>

<style>
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:10vh;
    }
    button{
        width:460px;
        height:280px;
        font-size:60px;
        font-weight:bold;
        color:white;

        cursor:pointer;
        background-color:gray;

<body>
    <button onclick="changeColor()">Click Here</button>

    function changeColor(){
       document. querySelector("button"). style. backgroundColor = "tomato"
    }     
  </script>
